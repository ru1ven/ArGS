defaults:
  - _self_
  #- dataset: arctic_waffleiron
  #- dataset: arctic_microwave 
  #- dataset: arctic_box
  #- dataset: arctic_ketchup
  #- dataset: arctic_phone   
  #- dataset: arctic_notebook
  #- dataset: arctic_laptop
  #- dataset: arctic_espressomachine
  #- dataset: arctic_capsulemachine
  - dataset: arctic_mixer
  #- dataset: arctic_scissors

  - pose_correction: supervice
  - texture: sh

  - rigid: skinning_field
  - non_rigid: hashgrid
  #- rigid: smpl_nn
  - option:
    - iter_arctic_50k

test_iterations: [15000, 20000, 25000, 30000, 50000]
save_iterations: [15000, 20000, 25000, 30000, 50000]
checkpoint_iterations: [20000, 25000, 30000]

wandb_disable: False

hydra:
  run:
    dir: exp/${name}
  job:
    chdir: false


name: ${dataset_name}-${tag}

tag: sam_nre3
#tag: NR+R

rigid_iter: 10000

model:
  gaussian:
    use_sh: true
    sh_degree: 3
    delay: 1000
  deformer:
    rigid:
      name: identity
    non_rigid:
      pose_correction:
        name: direct
      name: identity


dataset:
  preload: false
  train_smpl: false

  mode: ${mode}
  test_mode: view
  predict_seq: 0
  freeview: false

  resolution: -1
  padding: 0.1
  white_background: false
  data_device: cuda
  eval: false

  color_factor: 0

opt:
  iterations: 60000
  grad_clip: 0.1

  # learning rates
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  dynamic_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001

  pose_correction_lr: 1e-7
  rigid_lr: 1e-4

  objrigid_lr: 1e-3
  angle_lr: 1e-3

  non_rigid_lr: 1e-3
  lr_ratio: 0.01

  
  # loss weights
  lambda_l1: 1.
  lambda_dssim: 0.
  lambda_perceptual: 1e-2
  mask_loss_type: l1
#  lambda_mask: [0.1,5000,0]
  lambda_mask: 1.
  lambda_opacity: 0.
  lambda_skinning: [10,1000,0.1]
  lambda_pose: 0.
  lambda_aiap_xyz: 1.
  lambda_aiap_cov: 100.

  # densification configs
  percent_dense: 0.01
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 45000
  densify_grad_threshold: 0.0002
  opacity_threshold: 0.05

pipeline:
  convert_SHs_python: false
  compute_cov3D_python: trues
  debug: false

  pose_noise: 0

debug_from: -1
detect_anomaly: false

test_interval: -1
seed: 0

# start_checkpoint: /mnt/sda2/lxy/NonrigidGS_results/waffleiron/arctic_waffleiron-NR_15kfix+25knr/ckpt25000.pth



mode: test
load_ckpt: null
evaluate: true
clean: true