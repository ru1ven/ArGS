defaults:
  - _self_
  - dataset: wild_lxy
  - pose_correction: supervice
  - texture: sh
  - rigid: skinning_field
  - non_rigid: hashgrid


wandb_disable: True
save_code: False

hydra:
  run:
    dir: exp/${name}
  job:
    chdir: false

refine_epoch: 15
batch_size: 8
test_batch_size: 1

name: ${dataset_name}-${tag}
# name: ${dataset_name}-${rigid_name}-${texture_name}-${tag}
#name: 'HO_10_seg'

tag: hogs_util30k_delay0
refine_tag: wild

ckpt_dir: '/home/cyc/pycharm/lxy/3DGS/result/dexycb-hogs_util30k_delay0/ckpt360000.pth'

model:
  gaussian:
    use_sh: true
    sh_degree: 3
    delay: 2000
  deformer:
    rigid:
      name: identity
    non_rigid:
      pose_correction:
        name: supervise


dataset:
  preload: false
  train_smpl: false

  mode: ${mode}
  test_mode: view
  predict_seq: 0
  freeview: false

  resolution: -1
  padding: 0.1
  white_background: false
  data_device: cuda
  eval: false

opt:
  iterations: 30000
  grad_clip: 0

  densify_until_iter: 15000
  densification_interval: 100
  densify_from_iter: 500
  opacity_reset_interval: 3000

  # learning rates
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001

  pose_correction_lr: 1e-5
  rigid_lr: 1e-4
  objrigid_lr: 1e-4
  non_rigid_lr: 1e-3
  lr_ratio: 0.01

  # loss weights
  lambda_l1: 1.
  lambda_dssim: 0.
  lambda_perceptual: 1e-2
  mask_loss_type: l1
  #  lambda_mask: [0.1,5000,0]
  lambda_mask: 0.1
  lambda_opacity: 0.
  lambda_skinning: [ 10,1000,0.1 ]
  lambda_pose: 0.
  lambda_aiap_xyz: 1.
  lambda_aiap_cov: 100.

  lambda_distortion: 100.
  distortion_from_iter: 15000
  lambda_depth_normal: 5e-2
  depth_normal_from_iter: 15000

  # densification configs
  percent_dense: 0.01

  densify_grad_threshold: 0.0002
  opacity_threshold: 0.05

  lambda_nr_xyz: 1e-1


pipeline:
  convert_SHs_python: false
  compute_cov3D_python: true
  debug: false

  pose_noise: 0

debug_from: -1
detect_anomaly: false

test_interval: -1
save_iterations: [15000,30000,50000]
seed: 0
checkpoint_iterations: []
start_checkpoint: null



mode: test
load_ckpt: null
evaluate: true
clean: true