    use_sh: true
    sh_degree: 3
    delay: 20000
  deformer:
    rigid:
      name: skinning_field
      distill: false
      res: 64
      z_ratio: 4
      d_out: 16
      soft_blend: 20
      n_reg_pts: 1024
      skinning_network:
        otype: VanillaMLP
        n_neurons: 128
        n_hidden_layers: 4
        skip_in: []
        cond_in: []
        multires: 0
    non_rigid:
      delay: 8000
      until: 360000
      pose_correction:
        name: supervice
        delay: 60000
        mlp:
          n_neurons: 128
          n_hidden_layers: 3
          skip_in: []
          cond_in:
          - 0
          multires: 0
          last_layer_init: true
      name: hashgrid
      scale_offset: logit
      rot_offset: mult
      feature_dim: ${model.texture.non_rigid_dim}
      latent_dim: 0
      pose_encoder:
        num_joints: 16
        rel_joints: false
        dim_per_joint: 6
        out_dim: -1
      hashgrid:
        n_levels: 16
        n_features_per_level: 2
        log2_hashmap_size: 16
        base_resolution: 16
        per_level_scale: 1.447269237440378
        max_resolution: 2048
      mlp:
        n_neurons: 128
        n_hidden_layers: 3
        skip_in: []
        cond_in:
        - 0
        multires: 0
        last_layer_init: true
  texture:
    name: sh2rgb
    cano_view_dir: true
    view_noise: 45
    sh_degree: 3
    non_rigid_dim: 256
